

# pytest.ini — Configuration pytest
# Placez ce fichier à la racine : trading-bot-mvp/pytest.ini

[pytest]
# Ajoute la racine du projet au sys.path pour que "from app.xxx import" fonctionne
pythonpath = .

# Dossier contenant les tests
testpaths = tests

# Affichage verbose par défaut
addopts =
    -v
    --tb=short
    --strict-markers

# Marqueurs personnalisés
markers =
    unit:        Tests unitaires rapides
    integration: Tests d'intégration (endpoints FastAPI)
    slow:        Tests lents

# Supprime les warnings de dépréciation tiers
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Configuration pytest-asyncio
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function